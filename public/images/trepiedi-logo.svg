<svg viewBox="0 0 225 42.7" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trepiedi">
    <!-- Woordmerk TREPIEDI: slank, geometrisch, ruim getrackt zoals Tremani.
         textLength houdt de breedte (en dus de afstand tot het blokje) constant. -->
    <text x="0" y="33"
          font-family="'Century Gothic', 'Futura', 'Trebuchet MS', 'Segoe UI', sans-serif"
          font-size="37" font-weight="300"
          textLength="177" lengthAdjust="spacingAndGlyphs"
          fill="#005bbf">TREPIEDI</text>

    <!-- Afgerond vierkant (overgenomen uit het Tremani-logo) -->
    <path fill="#005bbf"
          d="m225 40.3c0 1.3-1.1 2.4-2.4 2.4h-37.9c-1.3 0-2.4-1.1-2.4-2.4v-37.9c0-1.3 1.1-2.4 2.4-2.4h37.9c1.3 0 2.4 1.1 2.4 2.4z"/>

    <!-- Witte voetafdruk in het vierkant -->
    <g fill="#fff">
        <!-- voetzool met lichte holte (boog) -->
        <path d="M199.5 11.2
                 C204 9.6 208.6 10.6 210 14.6
                 C211.3 18.1 210.7 21.6 210 25.1
                 C209.3 28.6 209.6 32.1 207 34.6
                 C204.4 37 200 36.6 198.4 33.6
                 C196.9 30.6 198.3 27.6 198 24.1
                 C197.7 20.5 195.4 18.6 196 15
                 C196.4 12.7 197.5 11.7 199.5 11.2 Z"/>
        <!-- teentjes, van grote teen (binnen) naar kleine teen (buiten) -->
        <ellipse cx="198.9" cy="7.3"  rx="2.1" ry="2.4"/>
        <circle  cx="203.0" cy="5.7"  r="1.75"/>
        <circle  cx="206.5" cy="5.6"  r="1.55"/>
        <circle  cx="209.4" cy="6.7"  r="1.35"/>
        <circle  cx="211.6" cy="8.5"  r="1.15"/>
    </g>
</svg>
