    inconsistent_intro: 'Tegenstrijdige voorspellingen: je voorspelde uitslag wijst de ene ploeg als winnaar aan, maar je laat de andere doorgaan (bv. 2–1 voor de thuisploeg, maar de uitploeg gaat door). Bovenaan staat wie de meeste tegenstrijdigheden heeft. Per ronde: aantal tegenstrijdig.'
